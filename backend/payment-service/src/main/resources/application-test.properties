spring.application.name=payment-service

frontend.url=http://localhost:5173

eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.datasource.url=jdbc:h2:mem:paymentdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

momo.partnercode=DUMMY
momo.accesskey=DUMMY
momo.secretkey=DUMMY
momo.url=http://localhost
momo.refund-url=http://localhost
momo.ipn-url=http://localhost
momo.redirect-url=http://localhost

jwt.secret=test-secret