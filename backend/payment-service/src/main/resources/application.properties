spring.application.name=payment-service
server.port=${PORT:8084}

frontend.url=${FRONTEND_URL}

spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.jpa.open-in-view=false

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
management.health.eureka.enabled=false

eureka.client.service-url.defaultZone=${EUREKA_URL}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.should-enforce-registration-at-init=false
eureka.client.eureka-server-connect-timeout-seconds=10
eureka.client.eureka-server-read-timeout-seconds=10
eureka.client.registry-fetch-interval-seconds=30

feign.httpclient.enabled=true
feign.okhttp.enabled=false

spring.datasource.url=${DATASOURCE_URL}
spring.datasource.username=${DATASOURCE_USERNAME}
spring.datasource.password=${DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

momo.partnercode=${MOMO_PARTNERCODE}
momo.accesskey=${MOMO_ACCESSKEY}
momo.secretkey=${MOMO_SECRETKEY}
momo.url=${MOMO_URL}
momo.ipn-url=${BACKEND_URL}/api/payment/momo/redirect
momo.redirect-url=${BACKEND_URL}/api/payment/momo/redirect
momo.refund-url=${MOMO_REFUND_URL}

jwt.secret=${JWT_SECRET}