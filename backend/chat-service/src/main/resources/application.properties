spring.application.name=chat-service
server.port=${PORT:8086}

spring.data.mongodb.min-connections-per-host=1
spring.data.mongodb.max-connections-per-host=5
spring.data.mongodb.max-wait-time=120000

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
management.health.eureka.enabled=false

eureka.client.service-url.defaultZone=${EUREKA_URL}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.should-enforce-registration-at-init=false
eureka.client.eureka-server-connect-timeout-seconds=10
eureka.client.eureka-server-read-timeout-seconds=10
eureka.client.registry-fetch-interval-seconds=30

feign.httpclient.enabled=true
feign.okhttp.enabled=false

spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI}

jwt.secret=${JWT_SECRET}