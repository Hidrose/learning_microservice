name: CI/CD Pipeline

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]
  workflow_dispatch: # Chạy thủ công khi cần

jobs:
  # ──────────────────────────────────────────────────────────────
  # JOB 0: Phát hiện service nào thay đổi (chỉ chạy trên main)
  # ──────────────────────────────────────────────────────────────
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      services: ${{ steps.set-matrix.outputs.services }}
      any_changed: ${{ steps.set-matrix.outputs.any_changed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed services
        id: set-matrix
        run: |
          SERVICES=()

          check_service() {
            local name=$1
            local path=$2
            if git diff --name-only HEAD~1 HEAD | grep -q "^$path/"; then
              SERVICES+=("$name")
              echo "  → Changed: $name"
            fi
          }

          echo "=== Files changed in this push ==="
          git diff --name-only HEAD~1 HEAD

          echo ""
          echo "=== Detecting changed services ==="
          check_service "eureka-server"     "backend/eureka-server"
          check_service "user-service"      "backend/user-service"
          check_service "auth-service"      "backend/auth-service"
          check_service "product-service"   "backend/product-service"
          check_service "category-service"  "backend/category-service"
          check_service "brand-service"     "backend/brand-service"
          check_service "order-service"     "backend/order-service"
          check_service "payment-service"   "backend/payment-service"
          check_service "cart-service"      "backend/cart-service"
          check_service "chat-service"      "backend/chat-service"
          check_service "assistant-service" "backend/assistant-service"
          check_service "api-gateway"       "backend/api-gateway"
          check_service "frontend"          "frontend"

          # Nếu docker-compose.prod.yml thay đổi → deploy tất cả
          if git diff --name-only HEAD~1 HEAD | grep -q "^docker-compose.prod.yml"; then
            echo "  → docker-compose.prod.yml changed → redeploy ALL services"
            SERVICES=("eureka-server" "user-service" "auth-service" "product-service"
                      "category-service" "brand-service" "order-service" "payment-service"
                      "cart-service" "chat-service" "assistant-service" "api-gateway" "frontend")
          fi

          if [ ${#SERVICES[@]} -eq 0 ]; then
            echo "No service changes detected."
            echo "any_changed=false" >> $GITHUB_OUTPUT
            echo "services=[]"       >> $GITHUB_OUTPUT
          else
            echo "any_changed=true" >> $GITHUB_OUTPUT
            JSON=$(printf '%s\n' "${SERVICES[@]}" | jq -R . | jq -s -c .)
            echo "services=$JSON"  >> $GITHUB_OUTPUT
            echo ""
            echo "Services to deploy: $JSON"
          fi


  test-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install deps
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

  test-backend:
    runs-on: ubuntu-latest

    env:
      SPRING_PROFILES_ACTIVE: test

    strategy:
      fail-fast: false
      matrix:
        service:
          - eureka-server
          - api-gateway
          - assistant-service
          - user-service
          - auth-service
          - product-service
          - category-service
          - brand-service
          - order-service
          - payment-service
          - cart-service
          - chat-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build & test ${{ matrix.service }}
        working-directory: backend/${{ matrix.service }}
        run: mvn clean verify

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: test-frontend
    if: ${{ github.ref == 'refs/heads/main' }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy frontend
        run: |
          curl -X POST "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}"

  # ──────────────────────────────────────────────────────────────
  # JOB 4: Build Docker images & push lên Docker Hub
  # ──────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push - ${{ matrix.service }}
    needs: [detect-changes, test-backend, test-frontend]
    if: |
      needs.detect-changes.result == 'success' &&
      needs.detect-changes.outputs.any_changed == 'true' &&
      needs.test-backend.result == 'success' &&
      needs.test-frontend.result == 'success'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
      fail-fast: false # service khác không bị stop nếu 1 service fail

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine build context
        id: ctx
        run: |
          if [ "${{ matrix.service }}" = "frontend" ]; then
            echo "context=./frontend" >> $GITHUB_OUTPUT
          else
            echo "context=./backend/${{ matrix.service }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ${{ steps.ctx.outputs.context }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ──────────────────────────────────────────────────────────────
  # JOB 5: Deploy lên AWS EC2
  # ──────────────────────────────────────────────────────────────
  deploy-ec2:
    name: Deploy to AWS EC2
    needs: [detect-changes, build-and-push]
    if: |
      needs.detect-changes.result == 'success' &&
      needs.detect-changes.outputs.any_changed == 'true' &&
      needs.build-and-push.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: SSH & Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 600s
          script: |
            set -e
            cd ~/learning_microservice

            echo "=== Pulling latest code ==="
            git pull origin main

            SERVICES='${{ needs.detect-changes.outputs.services }}'
            echo "=== Services to deploy: $SERVICES ==="

            echo "$SERVICES" | jq -r '.[]' | while read SERVICE; do
              IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/$SERVICE:latest"
              echo ""
              echo "▶ Pulling image: $IMAGE"
              docker pull "$IMAGE"

              echo "▶ Restarting service: $SERVICE"
              docker-compose -f docker-compose.prod.yml up -d --no-deps --force-recreate "$SERVICE"
              echo "✓ $SERVICE deployed successfully"
            done

            echo ""
            echo "=== Cleaning up old images ==="
            docker image prune -f

            echo ""
            echo "=== Current running containers ==="
            docker-compose -f docker-compose.prod.yml ps

  create_issue:
    runs-on: ubuntu-latest
    needs:
      - test-frontend
      - test-backend
      - deploy-frontend
      - build-and-push
      - deploy-ec2
    if: failure()
    permissions:
      issues: write

    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const title = `FAILURE: CI/CD Pipeline Failed on branch ${branch}`;

            const body = `
            **CI/CD Pipeline Failed**

            **Branch:** \`${branch}\`
            **Commit:** \`${context.sha}\`

            | Job | Result |
            |-----|--------|
            | Test frontend | ${{ needs.test-frontend.result }} |
            | Test backend | ${{ needs.test-backend.result }} |
            | Deploy frontend (Render) | ${{ needs.deploy-frontend.result || 'skipped' }} |
            | Build & Push Docker | ${{ needs.build-and-push.result || 'skipped' }} |
            | Deploy EC2 | ${{ needs.deploy-ec2.result || 'skipped' }} |

            **Workflow Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}

            *Created automatically by GitHub Actions.*
            `;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['bug', 'ci/cd-failure'],
              assignees: [context.actor]
            });

  close_issue_test:
    runs-on: ubuntu-latest
    needs: [test-frontend, test-backend]
    if: needs.test-frontend.result == 'success' && needs.test-backend.result == 'success'
    permissions:
      issues: write

    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = `FAILURE: CI/CD Pipeline Failed on branch ${context.ref.replace('refs/heads/', '')}`;
            const results = await github.rest.search.issuesAndPullRequests({
              q: `is:open repo:${context.repo.owner}/${context.repo.repo} in:title "${title}" label:ci/cd-failure`,
            });

            for (const issue of results.data.items) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Test job has passed. Closing CI/CD failure issue.`,
              });

              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }

  close_issue_deploy:
    runs-on: ubuntu-latest
    needs: [deploy-frontend]
    if: needs.deploy-frontend.result == 'success'
    permissions:
      issues: write

    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = `FAILURE: CI/CD Pipeline Failed on branch ${context.ref.replace('refs/heads/', '')}`;
            const results = await github.rest.search.issuesAndPullRequests({
              q: `is:open repo:${context.repo.owner}/${context.repo.repo} in:title "${title}" label:ci/cd-failure`,
            });

            for (const issue of results.data.items) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Deploy job has passed. Closing CI/CD failure issue.`,
              });

              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }
