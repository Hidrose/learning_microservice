      JWT_SECRET: ${JWT_SECRET}
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx192m"
    depends_on:
      eureka-server:
        condition: service_healthy
    restart: unless-stopped

  assistant-service:
    image: ${DOCKERHUB_USERNAME}/assistant-service:latest
    container_name: assistant-service
    networks:
      - app-network
